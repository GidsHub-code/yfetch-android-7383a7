name: Build Android App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Write google-services.json (enables Firebase Cloud Messaging)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret not set — FCM push will be disabled in this build."
            echo "Add it (raw JSON or base64) in repo Settings → Secrets and variables → Actions to enable push."
            exit 0
          fi
          # Accept either raw JSON or base64-encoded JSON
          if printf '%s' "$GOOGLE_SERVICES_JSON" | head -c 1 | grep -q '{'; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          fi
          echo "google-services.json written ($(wc -c < app/google-services.json) bytes) — Firebase plugin will activate."

      - name: Validate FCM server key (FCM_SERVICE_ACCOUNT_JSON) — never bundled into the app
        env:
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          # SECURITY: FCM_SERVICE_ACCOUNT_JSON is a Google service-account PRIVATE key.
          # It is used by your *backend* (e.g. signalme.pro) to SEND pushes via the
          # FCM HTTP v1 API. It must NEVER be embedded inside the APK/AAB — anyone
          # could extract it and impersonate your backend. This step only validates
          # it and then deletes it from the runner.
          if [ -z "$FCM_SERVICE_ACCOUNT_JSON" ]; then
            echo "FCM_SERVICE_ACCOUNT_JSON not set — fine for the app build."
            echo "Add it to your push-sending backend instead (signalme.pro)."
          else
            TMP_SA="$RUNNER_TEMP/fcm-service-account.json"
            if printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" | head -c 1 | grep -q '{'; then
              printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" > "$TMP_SA"
            else
              printf '%s' "$FCM_SERVICE_ACCOUNT_JSON" | base64 --decode > "$TMP_SA"
            fi
            python3 - "$TMP_SA" <<'PY'
          import json, sys
          with open(sys.argv[1]) as f: sa = json.load(f)
          required = ["type","project_id","private_key","client_email","token_uri"]
          missing = [k for k in required if k not in sa]
          if missing:
              print("::error::FCM_SERVICE_ACCOUNT_JSON missing keys: " + ", ".join(missing)); sys.exit(1)
          if sa.get("type") != "service_account":
              print("::error::FCM_SERVICE_ACCOUNT_JSON is not a service_account key"); sys.exit(1)
          print("FCM service account OK — project_id=" + sa["project_id"])
          PY
            shred -u "$TMP_SA" 2>/dev/null || rm -f "$TMP_SA"
            echo "Validated. Key was NOT bundled into the APK/AAB."
          fi

      - name: Build signed release APK and AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are missing. Add KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/git2app-release.jks"
          export KEYSTORE_PATH="$RUNNER_TEMP/git2app-release.jks"
          ./gradlew --no-daemon assembleRelease bundleRelease --stacktrace

      - name: Upload signed release APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk-aab
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
